<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Painel Admin</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #ff4500;
}

.container {
    display: flex;
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.item {
    border-bottom: 1px solid #ddd;
    padding: 10px 0;
}

input {
    padding: 5px;
    margin: 5px 0;
    width: 90%;
}

button {
    padding: 6px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.salvar {
    background: #28a745;
    color: white;
}

.topo {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.topo a {
    text-decoration: none;
    background: #ff4500;
    color: white;
    padding: 10px;
    border-radius: 5px;
}
</style>

</head>
<body>

<h1>🍔 Painel Administrativo</h1>

<div class="topo">
    <a href="{{ url_for('index') }}">Ver Cardápio</a>
    <a href="{{ url_for('limpar_pedidos_admin') }}">Limpar Pedidos</a>
</div>

<!-- 🔥 PEDIDOS (APENAS VIA JS - SEM DUPLICAÇÃO) -->
<div class="card">
    <h2>📋 Pedidos</h2>
    <div id="lista-pedidos">
        <p>Carregando pedidos...</p>
    </div>
</div>

<!-- PRODUTOS -->
<div class="container">

<!-- HAMBURGUERES -->
<div class="card">
    <h2>Hambúrgueres</h2>

    {% for item in hamburgueres %}
    <div class="item">

        <strong>{{ item.nome }}</strong><br>

        <img src="{{ url_for('static', filename=item.imagem_url) }}" width="80"><br>

        <form action="{{ url_for('atualizar_produto') }}" method="POST">
            <input type="hidden" name="id" value="{{ item.id }}">
            <input type="hidden" name="categoria" value="hamburguer">

            Descrição:<br>
            <input type="text" name="descricao" value="{{ item.descricao }}"><br>

            Preço:<br>
            <input type="number" step="0.01" name="preco" value="{{ item.preco }}"><br>

            <button class="salvar">Salvar</button>
        </form>

    </div>
    {% endfor %}
</div>

<!-- BEBIDAS -->
<div class="card">
    <h2>Bebidas</h2>

    {% for item in bebidas %}
    <div class="item">

        <strong>{{ item.nome }}</strong><br>

        <img src="{{ url_for('static', filename=item.imagem_url) }}" width="80"><br>

        <form action="{{ url_for('atualizar_produto') }}" method="POST">
            <input type="hidden" name="id" value="{{ item.id }}">
            <input type="hidden" name="categoria" value="bebida">

            Descrição:<br>
            <input type="text" name="descricao" value="{{ item.descricao }}"><br>

            Preço:<br>
            <input type="number" step="0.01" name="preco" value="{{ item.preco }}"><br>

            <button class="salvar">Salvar</button>
        </form>

    </div>
    {% endfor %}
</div>

</div>

<!-- 🔥 SCRIPT FINAL (SEM DUPLICAÇÃO) -->
<script>
let ultimoTotal = -1;

function carregarPedidos() {
    fetch('/pedidos_json')
        .then(res => res.json())
        .then(data => {

            let totalAtual = data.pedidos.length;

            // só atualiza se mudou
            if (totalAtual !== ultimoTotal) {

                let html = '';

                if (totalAtual === 0) {
                    html = "<p>Nenhum pedido ainda</p>";
                } else {
                    data.pedidos.forEach(pedido => {
                        html += `
                        <div class="item">
                            <strong>Cliente:</strong> ${pedido.cliente}<br>
                            <strong>Mesa:</strong> ${pedido.mesa}<br>
                            <strong>Horário:</strong> ${pedido.horario}<br>
                            <strong>Status:</strong> ${pedido.status}<br>

                            <strong>Itens:</strong>
                            <ul>
                                ${pedido.itens.map(i => `<li>${i.nome} - R$ ${i.preco}</li>`).join('')}
                            </ul>

                            <strong>Total:</strong> R$ ${pedido.total}
                        </div>
                        `;
                    });
                }

                document.getElementById('lista-pedidos').innerHTML = html;
                ultimoTotal = totalAtual;
            }
        });
}

// 🔥 atualiza sem duplicar
setInterval(carregarPedidos, 3000);

// primeira carga
carregarPedidos();
</script>

</body>
</html>
