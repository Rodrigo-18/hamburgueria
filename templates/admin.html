<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<title>Controle Dos Pedidos</title>

<style>
body {
    font-family: Arial;
    background: #f5f5f5;
    margin: 0;
    padding: 20px;
}

h1 {
    text-align: center;
    color: #ff4500;
}

.container {
    display: flex;
    gap: 20px;
}

.card {
    background: white;
    padding: 20px;
    border-radius: 10px;
    margin-bottom: 20px;
    box-shadow: 0 4px 8px rgba(0,0,0,0.1);
}

.item {
    border-bottom: 1px solid #ddd;
    padding: 10px 0;
}

input {
    padding: 5px;
    margin: 5px 0;
    width: 90%;
}

button {
    padding: 6px 10px;
    border: none;
    border-radius: 5px;
    cursor: pointer;
}

.salvar {
    background: #28a745;
    color: white;
}

.topo {
    display: flex;
    justify-content: space-between;
    margin-bottom: 20px;
}

.topo a {
    text-decoration: none;
    background: #ff4500;
    color: white;
    padding: 10px;
    border-radius: 5px;
}
</style>

</head>
<body>

<h1>🍔 Painel Administrativo</h1>

<div class="topo">
    <a href="{{ url_for('index') }}">Ver Cardápio</a>
    <a href="{{ url_for('relatorio_diario') }}">Ver Relatório Diário</a>
    <a href="{{ url_for('limpar_pedidos_admin') }}">Limpar Pedidos</a>
</div>

<!-- 🔥 PEDIDOS (APENAS VIA JS - SEM DUPLICAÇÃO) -->
<div class="card">
    <h2>📋 Pedidos</h2>
    <div id="lista-pedidos">
        <p>Carregando pedidos...</p>
    </div>
</div>

<!-- PRODUTOS -->
<div class="container">

<!-- HAMBURGUERES -->
<div class="card">
    <h2>Hambúrgueres</h2>

    {% for item in hamburgueres %}
    <div class="item">

        <strong>{{ item.nome }}</strong><br>

        <img src="{{ url_for('static', filename=item.imagem_url) }}" width="80"><br>

        <form action="{{ url_for('atualizar_produto') }}" method="POST">
            <input type="hidden" name="id" value="{{ item.id }}">
            <input type="hidden" name="categoria" value="hamburguer">

            Descrição:<br>
            <input type="text" name="descricao" value="{{ item.descricao }}"><br>

            Preço:<br>
            <input type="number" step="0.01" name="preco" value="{{ item.preco }}"><br>

            <button class="salvar">Salvar</button>
        </form>

    </div>
    {% endfor %}
</div>

<!-- BEBIDAS -->
<div class="card">
    <h2>Bebidas</h2>

    {% for item in bebidas %}
    <div class="item">

        <strong>{{ item.nome }}</strong><br>

        <img src="{{ url_for('static', filename=item.imagem_url) }}" width="80"><br>

        <form action="{{ url_for('atualizar_produto') }}" method="POST">
            <input type="hidden" name="id" value="{{ item.id }}">
            <input type="hidden" name="categoria" value="bebida">

            Descrição:<br>
            <input type="text" name="descricao" value="{{ item.descricao }}"><br>

            Preço:<br>
            <input type="number" step="0.01" name="preco" value="{{ item.preco }}"><br>

            <button class="salvar">Salvar</button>
        </form>

    </div>
    {% endfor %}
</div>

</div>

<script>
let ultimoTotal = -1;

function carregarPedidos() {
    fetch('/pedidos_json')
        .then(res => res.json())
        .then(data => {

            let comparador = data.pedidos.length + data.pedidos.map(p => p.status).join('');

            if (comparador !== ultimoTotal) {
                let htmlPendentes = '<h3>📋 Pedidos Pendentes</h3>';
                let htmlAtendidos = '<h3>✅ Pedidos Atendidos</h3>';
                let temPendente = false;
                let temAtendido = false;

                data.pedidos.forEach((pedido) => {
                console.log("Pedido ID:", pedido.id, "Status atual:", pedido.status);

                    let itensHtml = pedido.itens.map(i => `<li>${i.nome} - R$ ${i.preco}</li>`).join('');

                    let bloco = `
                        <div class="item" style="margin-bottom: 15px; border-bottom: 1px solid #eee;">
                            <strong>Cliente:</strong> ${pedido.cliente}<br>
                            <strong>Mesa:</strong> ${pedido.mesa}<br>
                            <strong>Itens:</strong> <ul>${itensHtml}</ul>
                            <strong>Total:</strong> R$ ${pedido.total}<br>
                    `;


                    if (pedido.status === 'pendente') {
                        bloco += `<button style="background: #28a745; color: white; margin: 10px 0; border:none; padding:8px; border-radius:5px; cursor:pointer;"
                                  onclick="atenderPedido(${pedido.id})">Marcar como Atendido</button>`;
                        htmlPendentes += bloco + "</div>";
                        temPendente = true;
                    } else {
                        bloco += `<p style="color: #666; font-style: italic;">Status: Atendido</p></div>`;
                        htmlAtendidos += bloco + "</div>";
                        temAtendido = true;
                    }
                });

                document.getElementById('lista-pedidos').innerHTML =
                    (temPendente ? htmlPendentes : "<h3>📋 Pedidos Pendentes</h3><p>Nenhum pedido pendente.</p>") +
                    "<hr style='margin: 20px 0;'>" +
                    (temAtendido ? htmlAtendidos : "<h3>✅ Pedidos Atendidos</h3><p>Nenhum pedido atendido.</p>");

                ultimoTotal = comparador;
            }
        });
}

function atenderPedido(id) {


    fetch(`/atender_pedido/${id}`, { method: 'POST' })
        .then(() => {

            ultimoTotal = -1;
            carregarPedidos();
        });
}


setInterval(carregarPedidos, 3000);
carregarPedidos();
</script>
